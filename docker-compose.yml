services:
  postgres:
    image: postgres:16-alpine
    container_name: projectcoder-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: projectcoder
    ports:
      - "5434:5432"
    volumes:
      - projectcoder-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d projectcoder"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  projectcoder-pgdata:
